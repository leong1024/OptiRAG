name: fiqa_stage1
dataset: fiqa
data_split: test
qrel_eval_protocol: parent_id_ref_passage_text
# Keep corpus small for free-tier embedding quotas.
# With batch size 32, 15,000 docs is ~469 embed requests for indexing.
fiqa_max_docs: 15000

# Overrides merged onto default Stage1TrialParams for index build + retrieval-only Optuna base.
# After changing embedding_model, run `optirag index build` again (use `--force` to ignore stale cache).
stage1_base:
  embedding_model: gemini-embedding-001

ragas:
  metric_names:
    - context_precision
    - context_recall
    - faithfulness
    - answer_relevancy
  weights:
    context_precision: 0.25
    context_recall: 0.25
    faithfulness: 0.25
    answer_relevancy: 0.25
  query_subset: 50
  seed: 42

optuna:
  n_trials: 10
  direction: maximize
  two_phase: false
  study_name: optirag-fiqa-s1
  storage: sqlite:///artifacts/optuna/optirag-fiqa-s1.db
  tune_index_hyperparams: false
